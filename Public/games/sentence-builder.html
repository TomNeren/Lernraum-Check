<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>LernSpiel — Sentence Builder</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">

        <!-- LOADING -->
        <div id="view-loading" class="view active" style="align-items: center; justify-content: center;">
            <div class="text-muted">Lade Spiel...</div>
        </div>

        <!-- GAME VIEW -->
        <div id="view-game" class="view">
            <div class="progress-bar">
                <div class="progress-bar-fill" id="progress-fill" style="width: 0%"></div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <span class="text-muted text-sm" id="question-counter">1 / 10</span>
                <span class="badge badge-accent" id="score-badge">0 Punkte</span>
            </div>

            <div class="timer" id="timer">30</div>

            <div class="question-text" id="question-text"></div>

            <!-- Drop Zone -->
            <div class="drop-zone" id="drop-zone">
                <div class="drop-placeholder">Tippe auf die Wörter in der richtigen Reihenfolge</div>
            </div>

            <!-- Word Chips -->
            <div class="chip-container" id="chip-container"></div>

            <div id="feedback-area" style="text-align: center; min-height: 48px; margin-bottom: 12px;"></div>

            <button class="btn btn-primary" id="check-btn" style="display: none;" onclick="checkSentence()">
                Überprüfen
            </button>
        </div>

        <!-- RESULTS VIEW -->
        <div id="view-results" class="view">
            <div class="header"><h1 id="results-emoji">🎉</h1></div>
            <div class="score-display">
                <div class="score-number" id="final-score">0</div>
                <div class="score-label">Punkte</div>
                <div class="score-percent" id="final-percent">0%</div>
            </div>
            <div style="display: flex; gap: 8px; margin-bottom: 20px;">
                <div class="card" style="flex: 1; text-align: center; padding: 12px;">
                    <div style="font-weight: 700; color: var(--success);" id="result-correct">0</div>
                    <div class="text-muted text-sm">Richtig</div>
                </div>
                <div class="card" style="flex: 1; text-align: center; padding: 12px;">
                    <div style="font-weight: 700; color: var(--danger);" id="result-wrong">0</div>
                    <div class="text-muted text-sm">Falsch</div>
                </div>
                <div class="card" style="flex: 1; text-align: center; padding: 12px;">
                    <div style="font-weight: 700;" id="result-time">0s</div>
                    <div class="text-muted text-sm">Zeit</div>
                </div>
            </div>
            <div class="section-title">Deine Antworten</div>
            <div id="answer-review"></div>
            <div class="section-title mt-24">Leaderboard</div>
            <div id="leaderboard"><div class="text-muted text-sm text-center" style="padding: 12px;">Lade...</div></div>
            <div class="mt-24" style="display: flex; gap: 8px;">
                <button class="btn btn-primary" onclick="location.reload()" style="flex: 1;">Nochmal spielen</button>
                <button class="btn btn-secondary" onclick="window.location.href='/hub.html'" style="flex: 1;">Zurück zum Hub</button>
            </div>
        </div>

        <!-- ERROR VIEW -->
        <div id="view-error" class="view" style="align-items: center; justify-content: center;">
            <div style="text-align: center;">
                <div style="font-size: 2rem; margin-bottom: 12px;">😕</div>
                <div id="error-message" style="color: var(--danger); margin-bottom: 16px;"></div>
                <button class="btn btn-secondary" onclick="window.location.href='/hub.html'">Zurück zum Hub</button>
            </div>
        </div>
    </div>

    <script src="/js/api.js?v=4"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/game-engine.js"></script>
    <script>
        if (!Auth.requireLogin()) {}

        let questions = [];
        let currentIndex = 0;
        let selectedWords = [];

        const engine = new GameEngine({
            onBuildReview(answers) {
                document.getElementById('answer-review').innerHTML = answers.map((a, i) => {
                    const q = questions[i];
                    const icon = a.correct ? '✅' : '❌';
                    return `<div class="result-item">
                        <span><span class="icon">${icon}</span> ${GameEngine.escapeHTML(q.correctSentence)}</span>
                        <span class="text-muted text-sm">${a.timeTaken}s</span>
                    </div>`;
                }).join('');
            }
        });

        async function init() {
            const gm = await engine.init();
            if (!gm) return;

            questions = gm.config.questions || [];
            if (questions.length === 0) { engine.showError('Keine Aufgaben vorhanden.'); return; }

            const settings = gm.config.settings || {};
            if (settings.shuffleQuestions) questions = GameEngine.shuffleArray([...questions]);

            engine.totalItems = questions.length;
            engine.maxScore = questions.length * (settings.pointsPerCorrect || 10);

            engine.showView('view-game');
            showQuestion();
        }

        function showQuestion() {
            if (currentIndex >= questions.length) { engine.finishGame(); return; }

            engine.answered = false;
            selectedWords = [];
            const q = questions[currentIndex];
            const settings = engine.gameModule.config.settings || {};

            engine.updateProgress(currentIndex, questions.length);
            document.getElementById('question-text').textContent = q.prompt || 'Bringe die Wörter in die richtige Reihenfolge:';

            // Scramble words
            const words = GameEngine.shuffleArray([...q.words]);
            const container = document.getElementById('chip-container');
            container.innerHTML = words.map((w, i) => `
                <button class="chip" data-word="${GameEngine.escapeHTML(w)}" data-index="${i}" onclick="selectWord(this)">
                    ${GameEngine.escapeHTML(w)}
                </button>
            `).join('');

            document.getElementById('drop-zone').innerHTML = '<div class="drop-placeholder">Tippe auf die Wörter in der richtigen Reihenfolge</div>';
            document.getElementById('check-btn').style.display = 'none';
            engine.clearFeedback();

            const timeLimit = q.timeLimit || settings.timeLimit || 30;
            engine.startTimer(timeLimit, () => { if (!engine.answered) timeUp(); });
        }

        function selectWord(btn) {
            if (engine.answered) return;

            if (btn.classList.contains('chip-selected')) {
                // Deselect — remove from drop zone
                btn.classList.remove('chip-selected');
                selectedWords = selectedWords.filter(w => w !== btn.dataset.word + '_' + btn.dataset.index);
                updateDropZone();
                return;
            }

            btn.classList.add('chip-selected');
            selectedWords.push(btn.dataset.word + '_' + btn.dataset.index);
            updateDropZone();

            // Show check button when all words are placed
            const totalWords = document.querySelectorAll('.chip').length;
            document.getElementById('check-btn').style.display =
                selectedWords.length === totalWords ? 'block' : 'none';
        }

        function updateDropZone() {
            const zone = document.getElementById('drop-zone');
            if (selectedWords.length === 0) {
                zone.innerHTML = '<div class="drop-placeholder">Tippe auf die Wörter in der richtigen Reihenfolge</div>';
                return;
            }
            zone.innerHTML = selectedWords.map(w => {
                const word = w.substring(0, w.lastIndexOf('_'));
                return `<span class="chip chip-placed">${GameEngine.escapeHTML(word)}</span>`;
            }).join(' ');
        }

        function checkSentence() {
            if (engine.answered) return;
            engine.answered = true;
            engine.stopTimer();

            const q = questions[currentIndex];
            const settings = engine.gameModule.config.settings || {};
            const timeTaken = engine.getElapsedSeconds();

            const givenSentence = selectedWords.map(w => w.substring(0, w.lastIndexOf('_'))).join(' ');
            const isCorrect = givenSentence === q.correctSentence;

            const points = engine.calculatePoints(isCorrect, settings);
            if (isCorrect) { engine.addScore(points); engine.correctCount++; }
            else { engine.wrongCount++; }

            engine.showFeedback(isCorrect, points, q.correctSentence);
            if (!isCorrect) engine.shake(document.getElementById('drop-zone'));

            engine.answers.push({ questionID: q.id, givenAnswer: givenSentence, correct: isCorrect, timeTaken });

            setTimeout(() => { currentIndex++; showQuestion(); }, isCorrect ? 1200 : 2500);
        }

        function timeUp() {
            engine.answered = true;
            engine.wrongCount++;
            const q = questions[currentIndex];
            engine.showTimeUpFeedback(q.correctSentence);
            engine.answers.push({ questionID: q.id, givenAnswer: '(Zeit abgelaufen)', correct: false, timeTaken: q.timeLimit || 30 });
            setTimeout(() => { currentIndex++; showQuestion(); }, 2000);
        }

        init();
    </script>
</body>
</html>
