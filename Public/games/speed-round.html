<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>LernSpiel — Speed Round</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">

        <div id="view-loading" class="view active" style="align-items: center; justify-content: center;">
            <div class="text-muted">Lade Spiel...</div>
        </div>

        <!-- GAME VIEW -->
        <div id="view-game" class="view">
            <div class="progress-bar">
                <div class="progress-bar-fill" id="progress-fill" style="width: 0%"></div>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <span class="text-muted text-sm" id="question-counter">1 / 10</span>
                <span class="badge badge-accent" id="score-badge">0 Punkte</span>
            </div>
            <div class="timer" id="timer">8</div>

            <!-- Streak -->
            <div style="text-align: center; margin-bottom: 12px;">
                <span class="text-muted text-sm">Streak: </span>
                <span id="streak-count" style="font-weight: 700; color: var(--accent);">0</span>
            </div>

            <!-- Big word display -->
            <div class="speed-word" id="speed-word"></div>

            <!-- Input -->
            <div class="input-group" style="margin-bottom: 12px;">
                <input type="text" id="speed-input" placeholder="Übersetzung eingeben..." autocomplete="off" autocapitalize="off" style="text-align: center; font-size: 1.2rem;">
            </div>

            <button class="btn btn-primary" id="submit-btn" onclick="submitAnswer()">Weiter</button>

            <div id="feedback-area" style="text-align: center; min-height: 48px; margin-top: 12px;"></div>
        </div>

        <!-- RESULTS VIEW -->
        <div id="view-results" class="view">
            <div class="header"><h1 id="results-emoji">🎉</h1></div>
            <div class="score-display">
                <div class="score-number" id="final-score">0</div>
                <div class="score-label">Punkte</div>
                <div class="score-percent" id="final-percent">0%</div>
            </div>
            <div style="display: flex; gap: 8px; margin-bottom: 20px;">
                <div class="card" style="flex: 1; text-align: center; padding: 12px;">
                    <div style="font-weight: 700; color: var(--success);" id="result-correct">0</div>
                    <div class="text-muted text-sm">Richtig</div>
                </div>
                <div class="card" style="flex: 1; text-align: center; padding: 12px;">
                    <div style="font-weight: 700; color: var(--danger);" id="result-wrong">0</div>
                    <div class="text-muted text-sm">Falsch</div>
                </div>
                <div class="card" style="flex: 1; text-align: center; padding: 12px;">
                    <div style="font-weight: 700;" id="result-time">0s</div>
                    <div class="text-muted text-sm">Zeit</div>
                </div>
            </div>
            <div style="text-align: center; margin-bottom: 20px;">
                <div class="text-muted text-sm">Bester Streak</div>
                <div style="font-size: 2rem; font-weight: 700; color: var(--accent);" id="best-streak">0</div>
            </div>
            <div class="section-title">Deine Antworten</div>
            <div id="answer-review"></div>
            <div class="section-title mt-24">Leaderboard</div>
            <div id="leaderboard"><div class="text-muted text-sm text-center" style="padding: 12px;">Lade...</div></div>
            <div class="mt-24" style="display: flex; gap: 8px;">
                <button class="btn btn-primary" onclick="location.reload()" style="flex: 1;">Nochmal spielen</button>
                <button class="btn btn-secondary" onclick="window.location.href='/hub.html'" style="flex: 1;">Zurück zum Hub</button>
            </div>
        </div>

        <!-- ERROR VIEW -->
        <div id="view-error" class="view" style="align-items: center; justify-content: center;">
            <div style="text-align: center;">
                <div style="font-size: 2rem; margin-bottom: 12px;">😕</div>
                <div id="error-message" style="color: var(--danger); margin-bottom: 16px;"></div>
                <button class="btn btn-secondary" onclick="window.location.href='/hub.html'">Zurück zum Hub</button>
            </div>
        </div>
    </div>

    <script src="/js/api.js?v=4"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/game-engine.js"></script>
    <script>
        if (!Auth.requireLogin()) {}

        let questions = [];
        let currentIndex = 0;
        let streak = 0;
        let bestStreak = 0;

        const engine = new GameEngine({
            onBuildReview(answers) {
                document.getElementById('best-streak').textContent = bestStreak;
                document.getElementById('answer-review').innerHTML = answers.map((a, i) => {
                    const q = questions[i];
                    const icon = a.correct ? '✅' : '❌';
                    return `<div class="result-item">
                        <span><span class="icon">${icon}</span> ${GameEngine.escapeHTML(q.prompt)} → ${GameEngine.escapeHTML(a.givenAnswer)}</span>
                        ${!a.correct ? `<span class="text-muted text-sm">Richtig: ${GameEngine.escapeHTML(q.correct)}</span>` : ''}
                    </div>`;
                }).join('');
            }
        });

        async function init() {
            const gm = await engine.init();
            if (!gm) return;

            questions = gm.config.questions || [];
            if (questions.length === 0) { engine.showError('Keine Aufgaben vorhanden.'); return; }

            const settings = gm.config.settings || {};
            if (settings.shuffleQuestions) questions = GameEngine.shuffleArray([...questions]);

            engine.totalItems = questions.length;
            engine.maxScore = questions.length * (settings.pointsPerCorrect || 10);

            engine.showView('view-game');
            showWord();
        }

        function showWord() {
            if (currentIndex >= questions.length) { engine.finishGame(); return; }

            engine.answered = false;
            const q = questions[currentIndex];
            const settings = engine.gameModule.config.settings || {};

            engine.updateProgress(currentIndex, questions.length);
            document.getElementById('speed-word').textContent = q.prompt;
            document.getElementById('speed-input').value = '';
            document.getElementById('speed-input').disabled = false;
            document.getElementById('speed-input').focus();
            document.getElementById('submit-btn').style.display = 'block';
            engine.clearFeedback();

            const timeLimit = q.timeLimit || settings.timeLimit || 8;
            engine.startTimer(timeLimit, () => { if (!engine.answered) timeUp(); });
        }

        function submitAnswer() {
            if (engine.answered) return;
            const input = document.getElementById('speed-input');
            const givenAnswer = input.value.trim();
            if (!givenAnswer) return;

            engine.answered = true;
            engine.stopTimer();

            const q = questions[currentIndex];
            const settings = engine.gameModule.config.settings || {};
            const timeTaken = engine.getElapsedSeconds();

            // Accept answer if matches (case-insensitive), also check alternatives
            const acceptedAnswers = [q.correct, ...(q.alternatives || [])].map(a => a.toLowerCase());
            const isCorrect = acceptedAnswers.includes(givenAnswer.toLowerCase());

            let points = engine.calculatePoints(isCorrect, settings);

            if (isCorrect) {
                streak++;
                if (streak > bestStreak) bestStreak = streak;
                // Streak bonus
                if (streak >= 3) points += Math.min(streak, 10);
                engine.addScore(points);
                engine.correctCount++;
                input.style.borderColor = 'var(--success)';
            } else {
                streak = 0;
                engine.wrongCount++;
                input.style.borderColor = 'var(--danger)';
                engine.shake(input);
            }

            document.getElementById('streak-count').textContent = streak;
            input.disabled = true;
            document.getElementById('submit-btn').style.display = 'none';
            engine.showFeedback(isCorrect, points, q.correct);

            engine.answers.push({ questionID: q.id, givenAnswer, correct: isCorrect, timeTaken });

            setTimeout(() => { currentIndex++; showWord(); }, isCorrect ? 800 : 1800);
        }

        document.getElementById('speed-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') submitAnswer();
        });

        function timeUp() {
            engine.answered = true;
            engine.wrongCount++;
            streak = 0;
            document.getElementById('streak-count').textContent = 0;
            const q = questions[currentIndex];
            document.getElementById('speed-input').disabled = true;
            document.getElementById('submit-btn').style.display = 'none';
            engine.showTimeUpFeedback(q.correct);
            engine.answers.push({ questionID: q.id, givenAnswer: '(Zeit abgelaufen)', correct: false, timeTaken: q.timeLimit || 8 });
            setTimeout(() => { currentIndex++; showWord(); }, 1500);
        }

        init();
    </script>
</body>
</html>
