<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>LernSpiel — Hub</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">

        <div class="header">
            <h1>LernSpiel</h1>
            <p class="subtitle" id="welcome-text">Hallo!</p>
        </div>

        <!-- Lernraum Badge -->
        <div id="raum-badge" class="glass-panel" style="display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; margin-bottom: 16px;">
            <span id="raum-text" style="font-weight: 600; font-size: 0.9rem;"></span>
            <button onclick="window.location.href='/lernraum.html'" style="background: rgba(255,255,255,0.5); border: var(--glass-border); color: var(--accent); padding: 4px 12px; border-radius: 99px; font-family: var(--font-sans); font-size: 0.75rem; font-weight: 600; cursor: pointer; box-shadow: var(--shadow-soft);">Raum wechseln</button>
        </div>

        <!-- Player Stats -->
        <div id="stats-bar" style="display: flex; gap: 8px; margin-bottom: 20px;">
            <div class="card" style="flex: 1; text-align: center; padding: 12px;">
                <div style="font-size: 1.5rem; font-weight: 700;" id="stat-games">0</div>
                <div class="text-muted text-sm">Spiele</div>
            </div>
            <div class="card" style="flex: 1; text-align: center; padding: 12px;">
                <div style="font-size: 1.5rem; font-weight: 700;" id="stat-score">0</div>
                <div class="text-muted text-sm">Punkte</div>
            </div>
            <div class="card" style="flex: 1; text-align: center; padding: 12px;">
                <div style="font-size: 1.5rem; font-weight: 700; color: var(--accent);" id="stat-avg">—</div>
                <div class="text-muted text-sm">Schnitt</div>
            </div>
        </div>

        <!-- Persönliche Aufgaben -->
        <div id="tasks-section" class="glass-panel" style="display: none; margin-bottom: 16px;">
            <div class="section-title" style="margin-top: 0;">Deine Aufgaben</div>
            <div id="tasks-list"></div>
        </div>

        <!-- Vokabeltrainer -->
        <div id="vocab-section" class="glass-panel" style="display: none; margin-bottom: 16px;">
            <div class="section-title" style="margin-top: 0;">Dein Vokabeltraining</div>
            <div class="card card-clickable" onclick="window.location.href='/games/vocab-srs.html'" style="border-color: var(--accent); background: var(--accent-glow); margin-bottom: 0;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h3>📚 Vokabeltrainer</h3>
                        <div class="meta" id="vocab-due-info">Lade...</div>
                    </div>
                    <span class="badge badge-accent">SRS</span>
                </div>
            </div>
        </div>

        <!-- Games List -->
        <div class="glass-panel">
            <div class="section-title" style="margin-top: 0;">Verfügbare Spiele</div>
            <div id="games-list">
                <div class="text-muted text-sm text-center" style="padding: 20px;">Lade Spiele...</div>
            </div>
        </div>

        <!-- Empty State -->
        <div id="no-games" style="display: none; text-align: center; padding: 40px 20px;">
            <div style="font-size: 2rem; margin-bottom: 8px;">🎮</div>
            <div class="text-muted">Noch keine Spiele verfügbar.</div>
        </div>

        <div class="spacer"></div>

        <!-- Footer -->
        <div style="padding: 16px 0; display: flex; gap: 8px;">
            <button class="btn btn-secondary" onclick="logoutStudent()" style="flex: 1;">
                Abmelden
            </button>
        </div>
    </div>

    <!-- Chat FAB Button -->
    <button id="chat-fab" onclick="toggleChat()" style="
        position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px;
        border-radius: 50%; background: var(--accent); color: #fff; border: none;
        font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        z-index: 1000; display: flex; align-items: center; justify-content: center;
        transition: transform 0.2s;
    ">
        <span id="chat-fab-icon">💬</span>
        <span id="chat-fab-badge" style="
            display: none; position: absolute; top: -2px; right: -2px;
            background: var(--danger); color: #fff; font-size: 0.65rem;
            min-width: 18px; height: 18px; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            font-weight: 700;
        "></span>
    </button>

    <!-- Chat Panel -->
    <div id="chat-panel" style="
        display: none; position: fixed; bottom: 90px; right: 16px; left: 16px;
        max-width: 400px; margin-left: auto;
        background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
        border: var(--glass-border);
        border-radius: var(--radius); box-shadow: var(--shadow-3d);
        z-index: 999; overflow: hidden;
    ">
        <div style="padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: 700; font-size: 0.95rem;">Nachricht an Lehrkraft</span>
            <button onclick="toggleChat()" style="background: none; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer;">&times;</button>
        </div>

        <!-- Quick messages -->
        <div style="padding: 12px 16px 4px; display: flex; flex-wrap: wrap; gap: 6px;">
            <button class="chat-quick-btn" onclick="sendQuickMessage('Ich brauche Hilfe')">Brauche Hilfe</button>
            <button class="chat-quick-btn" onclick="sendQuickMessage('Mein Computer funktioniert nicht')">PC-Problem</button>
            <button class="chat-quick-btn" onclick="sendQuickMessage('Ich bin fertig')">Fertig</button>
            <button class="chat-quick-btn" onclick="sendQuickMessage('Ich verstehe die Aufgabe nicht')">Frage zur Aufgabe</button>
        </div>

        <!-- Message history -->
        <div id="chat-messages" style="
            padding: 12px 16px; max-height: 200px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 8px;
        ">
            <div class="text-muted text-sm text-center" style="padding: 8px;">Noch keine Nachrichten</div>
        </div>

        <!-- Input -->
        <div style="padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px;">
            <input type="text" id="chat-input" placeholder="Nachricht schreiben..."
                maxlength="500"
                onkeydown="if(event.key==='Enter')sendChatMessage()"
                style="flex: 1; padding: 10px 14px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 99px; color: var(--text-primary); font-family: var(--font-sans); font-size: 0.85rem; outline: none;">
            <button onclick="sendChatMessage()" style="
                background: var(--accent); color: #fff; border: none;
                width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
                display: flex; align-items: center; justify-content: center;
                font-size: 1.1rem;
            ">&#10148;</button>
        </div>
    </div>

    <style>
        .chat-quick-btn {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.5);
            border: var(--glass-border);
            border-radius: 99px;
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .chat-quick-btn:hover {
            background: var(--accent-glow);
            border-color: var(--accent);
        }
        .chat-msg {
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.82rem;
            max-width: 85%;
            word-break: break-word;
        }
        .chat-msg-own {
            background: var(--accent);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .chat-msg-time {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 2px;
        }
        #chat-fab:hover { transform: scale(1.1); }
    </style>

    <script src="/js/api.js?v=5"></script>
    <script src="/js/auth.js"></script>
    <script>
        if (!Auth.requireLogin()) { /* redirected */ }

        const player = Auth.getPlayer();
        document.getElementById('welcome-text').textContent =
            `Hallo ${player.name}! (${player.klasse})`;

        // Stats laden
        async function loadStats() {
            try {
                const stats = await API.getPlayerStats(player.id);
                document.getElementById('stat-games').textContent = stats.totalGames;
                document.getElementById('stat-score').textContent = stats.totalScore;
                document.getElementById('stat-avg').textContent =
                    stats.totalGames > 0 ? Math.round(stats.averagePercent) + '%' : '—';
            } catch (e) {
                console.log('Stats nicht verfügbar:', e.message);
            }
        }

        // Spiele laden
        async function loadGames() {
            const container = document.getElementById('games-list');
            const noGames = document.getElementById('no-games');

            try {
                const games = await API.listGamesForPlayer(player.id);

                if (games.length === 0) {
                    container.style.display = 'none';
                    noGames.style.display = 'block';
                    return;
                }

                container.innerHTML = games.map(game => {
                    const typeLabel = {
                        'vocab-quiz': '📝 Vokabel-Quiz',
                        'sentence-builder': '🔤 Satzbauen',
                        'fill-blank': '✏️ Lückentext',
                        'mark-word': '🖍️ Markieren',
                        'complete-story': '📖 Geschichte',
                        'memory-match': '🃏 Memory',
                        'category-sort': '📂 Sortieren',
                        'speed-round': '⚡ Speed Round',
                    }[game.type] || '🎮 Spiel';

                    const metaParts = [];
                    if (game.kompetenz) metaParts.push(game.kompetenz);
                    if (game.lsNumber) metaParts.push(`LS ${game.lsNumber}`);
                    if (game.questionCount) metaParts.push(`${game.questionCount} Fragen`);

                    return `
                        <div class="card card-clickable" onclick="startGame('${game.id}', '${game.type}')">
                            <div style="display: flex; justify-content: space-between; align-items: start;">
                                <div>
                                    <h3>${game.title}</h3>
                                    <div class="meta">${metaParts.join(' · ')}</div>
                                </div>
                                <span class="badge badge-accent">${typeLabel}</span>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (e) {
                const errDiv = document.createElement('div');
                errDiv.className = 'card';
                errDiv.style.cssText = 'text-align: center; color: var(--danger);';
                errDiv.textContent = 'Fehler beim Laden: ' + e.message;
                container.innerHTML = '';
                container.appendChild(errDiv);
            }
        }

        function startGame(gameID, gameType) {
            const routes = {
                'vocab-quiz': '/games/vocab-quiz.html',
                'sentence-builder': '/games/sentence-builder.html',
                'fill-blank': '/games/fill-blank.html',
                'mark-word': '/games/mark-word.html',
                'complete-story': '/games/complete-story.html',
                'memory-match': '/games/memory-match.html',
                'category-sort': '/games/category-sort.html',
                'speed-round': '/games/speed-round.html',
            };
            const route = routes[gameType] || '/games/vocab-quiz.html';
            window.location.href = `${route}?game=${gameID}`;
        }

        // Raum anzeigen
        const currentRaum = Auth.getRaum();
        const raumBadge = document.getElementById('raum-badge');
        if (currentRaum) {
            document.getElementById('raum-text').textContent = `📍 ${currentRaum}`;
        } else {
            raumBadge.style.display = 'none';
        }

        // Vocab Stats laden
        async function loadVocabStats() {
            try {
                const stats = await API.getVocabStats(player.id);
                if (stats.total > 0) {
                    document.getElementById('vocab-section').style.display = 'block';
                    document.getElementById('vocab-due-info').textContent =
                        stats.dueToday > 0
                            ? `${stats.dueToday} Karten fällig heute`
                            : 'Alle Karten gelernt!';
                }
            } catch (e) {
                // Vocab nicht verfügbar — kein Problem
            }
        }

        // Personal Tasks laden
        async function loadTasks() {
            try {
                const tasks = await API.getPersonalTasks(player.id);
                if (tasks.length === 0) return;

                document.getElementById('tasks-section').style.display = 'block';
                const container = document.getElementById('tasks-list');

                const typeEmoji = {
                    'vocab-quiz': '📝', 'sentence-builder': '🔤', 'fill-blank': '✏️',
                    'mark-word': '🖍️', 'complete-story': '📖', 'memory-match': '🃏',
                    'category-sort': '📂', 'speed-round': '⚡'
                };

                const routes = {
                    'vocab-quiz': '/games/vocab-quiz.html',
                    'sentence-builder': '/games/sentence-builder.html',
                    'fill-blank': '/games/fill-blank.html',
                    'mark-word': '/games/mark-word.html',
                    'complete-story': '/games/complete-story.html',
                    'memory-match': '/games/memory-match.html',
                    'category-sort': '/games/category-sort.html',
                    'speed-round': '/games/speed-round.html',
                };

                container.innerHTML = tasks.map(task => {
                    const emoji = typeEmoji[task.type] || '📋';
                    const dueDateStr = task.dueDate
                        ? `Fällig: ${new Date(task.dueDate).toLocaleDateString('de-DE')}`
                        : '';

                    return `
                        <div class="card card-clickable" onclick="startPersonalTask('${task.id}', '${task.type}')"
                             style="border-color: var(--warning); background: var(--warning-bg);">
                            <div style="display: flex; justify-content: space-between; align-items: start;">
                                <div>
                                    <h3>${emoji} ${task.title}</h3>
                                    <div class="meta">${dueDateStr}</div>
                                    ${task.note ? `<div class="text-muted text-sm mt-8" style="font-style: italic;">${task.note}</div>` : ''}
                                </div>
                                <span class="badge badge-warning">Aufgabe</span>
                            </div>
                        </div>`;
                }).join('');
            } catch (e) {
                // Tasks nicht verfügbar
            }
        }

        function startPersonalTask(taskID, gameType) {
            // Store task ID for completion tracking
            sessionStorage.setItem('currentTaskID', taskID);
            const routes = {
                'vocab-quiz': '/games/vocab-quiz.html',
                'sentence-builder': '/games/sentence-builder.html',
                'fill-blank': '/games/fill-blank.html',
                'mark-word': '/games/mark-word.html',
                'complete-story': '/games/complete-story.html',
                'memory-match': '/games/memory-match.html',
                'category-sort': '/games/category-sort.html',
                'speed-round': '/games/speed-round.html',
            };
            const route = routes[gameType] || '/games/vocab-quiz.html';
            window.location.href = `${route}?task=${taskID}`;
        }

        async function logoutStudent() {
            try {
                await API.checkoutLernraum(player.id);
            } catch (e) { /* ignore */ }
            Auth.logout();
            window.location.href = '/';
        }

        // --- Chat ---
        let chatOpen = false;

        function toggleChat() {
            chatOpen = !chatOpen;
            document.getElementById('chat-panel').style.display = chatOpen ? 'block' : 'none';
            if (chatOpen) loadChatMessages();
        }

        async function loadChatMessages() {
            const container = document.getElementById('chat-messages');
            try {
                const messages = await API.getMyChatMessages(player.id);
                if (messages.length === 0) {
                    container.innerHTML = '<div class="text-muted text-sm text-center" style="padding: 8px;">Noch keine Nachrichten</div>';
                    return;
                }
                container.innerHTML = messages.reverse().map(msg => {
                    const time = new Date(msg.createdAt).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
                    const readIcon = msg.readAt ? ' &#10003;' : '';
                    return `<div class="chat-msg chat-msg-own">${escapeHtml(msg.message)}<div class="chat-msg-time" style="color: rgba(255,255,255,0.7);">${time}${readIcon}</div></div>`;
                }).join('');
                container.scrollTop = container.scrollHeight;
            } catch (e) {
                container.innerHTML = '<div class="text-muted text-sm text-center" style="padding: 8px;">Laden fehlgeschlagen</div>';
            }
        }

        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg) return;

            input.value = '';
            try {
                await API.sendChatMessage(player.id, msg);
                loadChatMessages();
            } catch (e) {
                alert('Nachricht konnte nicht gesendet werden: ' + e.message);
            }
        }

        async function sendQuickMessage(text) {
            try {
                await API.sendChatMessage(player.id, text);
                loadChatMessages();
                if (!chatOpen) toggleChat();
            } catch (e) {
                alert('Nachricht konnte nicht gesendet werden: ' + e.message);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadStats();
        loadGames();
        loadVocabStats();
        loadTasks();
    </script>
</body>
</html>
