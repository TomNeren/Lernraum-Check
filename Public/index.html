<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>LernSpiel</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div>

        <!-- Hero Section -->
        <div class="hero-section">
            <div class="hero-content" style="grid-template-columns: 1fr; text-align: center;">
                <div class="hero-text">
                    <h1>LernSpiel</h1>
                    <p class="subtitle">Willkommen zurück. Melde dich an, um zu spielen.</p>
                </div>
            </div>
        </div>

        <div style="max-width: 600px; margin: 0 auto; padding: 20px;">
            <!-- LOGIN VIEW -->
            <div id="view-login" class="view active glass-panel">
                <form id="login-form">

                    <div class="bento-grid" style="grid-template-columns: 1fr 1fr; gap: 16px; padding: 0; margin-bottom: 24px;">

                        <div class="bento-card" style="min-height: auto; padding: 24px;">
                            <label for="input-name" style="font-weight: 600; font-size: 0.9rem; color: var(--text-main); margin-bottom: 8px; display: block;">Vorname</label>
                            <input type="text" id="input-name" placeholder="Dein Vorname" autocomplete="off" required style="width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.8); font-size: 1rem; outline: none; transition: box-shadow 0.2s;">
                        </div>

                        <div class="bento-card" style="min-height: auto; padding: 24px;">
                            <label for="input-klasse" style="font-weight: 600; font-size: 0.9rem; color: var(--text-main); margin-bottom: 8px; display: block;">Klasse</label>
                            <input type="text" id="input-klasse" placeholder="z.B. BFW1, 1BFR2" autocomplete="off" required style="width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.8); font-size: 1rem; outline: none; transition: box-shadow 0.2s;">
                        </div>

                    </div>

                    <div id="login-error" style="color: var(--danger); font-size: 0.85rem; margin-bottom: 16px; text-align: center; display: none;"></div>

                    <button type="submit" class="btn btn-primary" id="btn-login" style="padding: 16px; font-size: 1.1rem; border-radius: 16px;">
                        Weiter
                    </button>
                </form>

                <div class="mt-24 text-center text-muted text-sm">
                    Dein Name wird gespeichert, damit dein Fortschritt erhalten bleibt.
                </div>
            </div>

            <!-- LOADING -->
            <div id="view-loading" class="view" style="align-items: center; justify-content: center; padding: 40px;">
                <div class="text-muted">Verbinde...</div>
            </div>
        </div>

    </div>

    <script src="/js/api.js?v=4"></script>
    <script src="/js/auth.js"></script>
    <script>
        // Wenn schon eingeloggt → direkt zur Lernraum-Auswahl
        if (Auth.isLoggedIn()) {
            window.location.href = '/lernraum.html';
        }

        const form = document.getElementById('login-form');
        const errorEl = document.getElementById('login-error');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.style.display = 'none';

            const name = document.getElementById('input-name').value.trim();
            const klasse = document.getElementById('input-klasse').value.trim();

            if (!name || !klasse) {
                errorEl.textContent = 'Bitte Name und Klasse eingeben.';
                errorEl.style.display = 'block';
                return;
            }

            const btn = document.getElementById('btn-login');
            btn.disabled = true;
            btn.textContent = 'Verbinde...';

            try {
                const player = await API.login(name, klasse);
                Auth.setPlayer(player);
                window.location.href = '/lernraum.html';
            } catch (err) {
                errorEl.textContent = `Fehler: ${err.message}`;
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Weiter';
            }
        });
    </script>
</body>
</html>
