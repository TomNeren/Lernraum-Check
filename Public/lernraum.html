<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>LernSpiel — Lernraum</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .raum-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .raum-card {
            position: relative;
            height: 140px;
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            box-shadow: var(--shadow-3d);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            display: flex;
            align-items: flex-end;
            background-size: cover;
            background-position: center;
        }

        .raum-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0) 100%);
            z-index: 1;
        }

        .raum-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 0 2px var(--accent);
        }

        .raum-card.selected {
            transform: scale(0.98);
            box-shadow: 0 0 0 4px var(--accent), var(--shadow-3d);
        }

        .raum-card-content {
            position: relative;
            z-index: 2;
            width: 100%;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;

            /* Spatial UI Glassmorphism overlay at the bottom */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .raum-card .raum-icon {
            font-size: 2rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .raum-card .raum-label {
            font-size: 1.25rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            letter-spacing: 0.5px;
        }

        /* Specific Backgrounds */
        .raum-card.klassenzimmer { background-image: url('/images/klassenzimmer.jpg'); }
        .raum-card.pausenhof { background-image: url('/images/pausenhof.jpg'); }
        .raum-card.arbeitsraum { background-image: url('/images/arbeitsraum.jpg'); }


        .custom-raum {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .custom-raum input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.5);
            border: var(--glass-border);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .custom-raum input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .custom-raum button {
            padding: 12px 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--font-sans);
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow-soft);
            transition: all 0.3s ease;
        }

        .custom-raum button:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
            box-shadow: 0 12px 28px rgba(255, 107, 107, 0.12);
        }

        @media (max-width: 360px) {
            .raum-card {
                height: 120px;
            }
            .raum-card-content {
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <div>

        <!-- Hero Section -->
        <div class="hero-section">
            <div class="hero-content" style="grid-template-columns: 1fr; text-align: center;">
                <div class="hero-text">
                    <h1>Dein Lernort.</h1>
                    <p class="subtitle">Wo lernst du heute?</p>
                </div>
            </div>
        </div>

        <div class="bento-grid" style="max-width: 800px; padding: 20px;">
            <div class="bento-card" style="padding: 0; min-height: 180px;" onclick="selectRaum('Klassenzimmer')">
                <div class="raum-card klassenzimmer" style="height: 100%; width: 100%; border-radius: 24px; box-shadow: none; margin: 0;">
                    <div class="raum-card-content" style="border-radius: 0 0 24px 24px;">
                        <div class="raum-label">Klassenzimmer</div>
                        <div class="raum-icon">🏫</div>
                    </div>
                </div>
            </div>

            <div class="bento-card" style="padding: 0; min-height: 180px;" onclick="selectRaum('Pausenhof')">
                <div class="raum-card pausenhof" style="height: 100%; width: 100%; border-radius: 24px; box-shadow: none; margin: 0;">
                    <div class="raum-card-content" style="border-radius: 0 0 24px 24px;">
                        <div class="raum-label">Pausenhof</div>
                        <div class="raum-icon">🌳</div>
                    </div>
                </div>
            </div>

            <div class="bento-card" style="padding: 0; min-height: 180px;" onclick="selectRaum('Arbeitsraum')">
                <div class="raum-card arbeitsraum" style="height: 100%; width: 100%; border-radius: 24px; box-shadow: none; margin: 0;">
                    <div class="raum-card-content" style="border-radius: 0 0 24px 24px;">
                        <div class="raum-label">Arbeitsraum</div>
                        <div class="raum-icon">📚</div>
                    </div>
                </div>
            </div>

            <div class="bento-card" style="justify-content: center; align-items: stretch; padding: 24px;">
                <div style="font-weight: 600; font-size: 1.1rem; color: var(--text-main); margin-bottom: 12px; text-align: left;">Anderer Ort</div>
                <div class="custom-raum" style="flex-direction: column; gap: 12px; margin-bottom: 0;">
                    <input type="text" id="custom-raum-input" placeholder="z.B. Zuhause..." autocomplete="off" style="width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.8); font-size: 1rem; outline: none; transition: box-shadow 0.2s;">
                    <button onclick="submitCustomRaum()" style="width: 100%; padding: 12px 16px; border-radius: 12px; font-size: 1rem;">Speichern</button>
                </div>
            </div>
        </div>

        <div id="error-msg" style="color: var(--danger); font-size: 0.85rem; text-align: center; display: none;"></div>

        <div class="spacer"></div>

        <div class="text-center text-muted text-sm" style="padding: 16px 0;">
            Dein Lernort wird gespeichert, damit die Lehrkraft sehen kann, wo du arbeitest.
        </div>
    </div>

    <script src="/js/api.js?v=4"></script>
    <script src="/js/auth.js"></script>
    <script>
        if (!Auth.requireLogin()) { /* redirected */ }

        const player = Auth.getPlayer();
        const errorEl = document.getElementById('error-msg');

        async function selectRaum(raum) {
            // Highlight selected card
            document.querySelectorAll('.raum-card').forEach(c => c.classList.remove('selected'));
            event.currentTarget.classList.add('selected');

            await doCheckin(raum);
        }

        async function submitCustomRaum() {
            const input = document.getElementById('custom-raum-input');
            const raum = input.value.trim();
            if (!raum) {
                errorEl.textContent = 'Bitte einen Ort eingeben.';
                errorEl.style.display = 'block';
                return;
            }
            await doCheckin(raum);
        }

        async function doCheckin(raum) {
            errorEl.style.display = 'none';
            try {
                await API.checkinLernraum(player.id, raum);
                Auth.setRaum(raum);
                window.location.href = '/hub.html';
            } catch (err) {
                errorEl.textContent = `Fehler: ${err.message}`;
                errorEl.style.display = 'block';
            }
        }

        // Enter key on custom input
        document.getElementById('custom-raum-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') submitCustomRaum();
        });
    </script>
</body>
</html>
